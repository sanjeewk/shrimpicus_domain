<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shrimpicus // {% block page_title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="page page--{{ active_page }}">
  <main class="cabinet">
    <header class="topbar">
      <div class="topbar__brand">
        <span class="topbar__logo" aria-hidden="true">
          <svg viewBox="0 0 48 48" shape-rendering="crispEdges" width="40" height="40">
            <!-- Body segments -->
            <rect x="14" y="18" width="20" height="4" fill="#ff570a"/>
            <rect x="12" y="22" width="24" height="4" fill="#d72638"/>
            <rect x="10" y="26" width="26" height="4" fill="#ff570a"/>
            <rect x="9" y="30" width="26" height="3" fill="#d72638"/>
            <!-- Head -->
            <rect x="16" y="14" width="16" height="4" fill="#d72638"/>
            <rect x="18" y="10" width="12" height="4" fill="#ff8040"/>
            <!-- Eyes -->
            <circle cx="22" cy="16" r="1.5" fill="#1a0d2e"/>
            <circle cx="26" cy="16" r="1.5" fill="#1a0d2e"/>
            <!-- Antennae -->
            <rect x="20" y="8" width="2" height="2" fill="#ff8040"/>
            <rect x="26" y="8" width="2" height="2" fill="#ff8040"/>
            <rect x="19" y="6" width="2" height="2" fill="#d72638"/>
            <rect x="27" y="6" width="2" height="2" fill="#d72638"/>
            <!-- Tail fan -->
            <rect x="8" y="33" width="4" height="2" fill="#ff570a"/>
            <rect x="12" y="33" width="4" height="3" fill="#d72638"/>
            <rect x="16" y="34" width="4" height="3" fill="#ff570a"/>
            <rect x="20" y="33" width="4" height="3" fill="#d72638"/>
            <rect x="24" y="34" width="4" height="2" fill="#ff570a"/>
            <!-- Legs (swimming legs) -->
            <rect x="14" y="26" width="2" height="2" fill="#ff8040"/>
            <rect x="18" y="28" width="2" height="2" fill="#ff8040"/>
            <rect x="22" y="28" width="2" height="2" fill="#ff8040"/>
            <rect x="26" y="26" width="2" height="2" fill="#ff8040"/>
            <rect x="30" y="28" width="2" height="2" fill="#ff8040"/>
            <!-- Walking legs -->
            <rect x="12" y="30" width="2" height="3" fill="#ff8040"/>
            <rect x="16" y="31" width="2" height="3" fill="#ff8040"/>
            <rect x="28" y="31" width="2" height="3" fill="#ff8040"/>
            <rect x="32" y="30" width="2" height="3" fill="#ff8040"/>
          </svg>
        </span>
        <span class="topbar__name">Shrimpicus</span>
      </div>
      <nav class="topbar__nav">
        <a href="{{ url_for('board') }}" class="navlink {% if active_page == 'board' %}is-active{% endif %}">Board</a>
        <a href="{{ url_for('habits') }}" class="navlink {% if active_page == 'habits' %}is-active{% endif %}">Habits</a>
        <a href="{{ url_for('social') }}" class="navlink {% if active_page == 'social' %}is-active{% endif %}">Social</a>
        <a href="{{ url_for('field') }}" class="navlink {% if active_page == 'field' %}is-active{% endif %}">Field</a>
        <a href="{{ url_for('logout') }}" class="navlink" style="margin-left: auto; color: #ff0066;">Logout</a>
      </nav>
    </header>

    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
